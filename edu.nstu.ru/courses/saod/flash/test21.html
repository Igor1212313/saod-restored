<div id="ruffle-container" data-swf="test21.swf" data-width="800" data-height="600" data-bgcolor="#ffffff" style="text-align: center;"></div>
<script>
window.addEventListener("DOMContentLoaded", function () {
  var ruffle = window.RufflePlayer && window.RufflePlayer.newest ? window.RufflePlayer.newest() : null;
  var container = document.getElementById("ruffle-container");
  if (!ruffle || !container) return;

  var player = ruffle.createPlayer();
  var width = container.getAttribute("data-width") || "800";
  var height = container.getAttribute("data-height") || "600";
  var bg = container.getAttribute("data-bgcolor") || "#ffffff";
  var swf = container.getAttribute("data-swf");

  player.style.width = width + "px";
  player.style.height = height + "px";
  player.style.display = "inline-block";
  player.style.backgroundColor = bg;
  container.appendChild(player);

  try {
    player.load({ url: swf, backgroundColor: bg });
  } catch (e) {
    try { player.load(swf); } catch (e2) {}
  }
});
</script>
